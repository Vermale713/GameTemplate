name = "studio713/game_template"
version = "0.1.0"
description = "A game template"
authors = ["vermale713"]
license = "MIT"

[target]
environment = "roblox"

[wally_indices]
default = "https://github.com/UpliftGames/wally-index"

[indices]
default = "https://github.com/pesde-pkg/index"

[scripts]
roblox_sync_config_generator = ".pesde/scripts/roblox_sync_config_generator.luau"
sourcemap_generator = ".pesde/scripts/sourcemap_generator.luau"

[dev_dependencies]
scripts = { name = "pesde/scripts_argon", version = "^0.2.0", target = "lune" }
argon = { name = "pesde/argon", version = "^2.0.27", target = "lune" }

[engines]
pesde = "^0.7.0"
lune = "^0.10.2"

[dependencies]
ConchUI = { name = "alicesaidhi/conch_ui", version = "^0.4.0-rc.6" }
Conch = { name = "alicesaidhi/conch", version = "^0.4.0-rc.6" }
Promise = { wally = "howmanysmall/typed-promise", version = "^4.0.6" }
Signal = { wally = "data-oriented-house/lemonsignal", version = "^1.11.0" }
ProfileStore = { wally = "lm-loleris/profilestore", version = "^1.0.3" }
Charm = { wally = "littensy/charm", version = "^0.11.0-rc.3" }
CharmSync = { wally = "littensy/charm-sync", version = "^0.4.0-rc.6" }
Squash = { wally = "data-oriented-house/squash", version = "^5.0.0" }
UiLabs = { wally = "pepeeltoro41/ui-labs", version = "^2.4.2" }
Vide = { name = "alicesaidhi/vide", version = "^0.4.1-testing.4" }
